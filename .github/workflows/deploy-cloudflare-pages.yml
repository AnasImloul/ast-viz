name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check if Pages project exists
        id: check_pages_project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: worker-ast-viz
        run: |
          status_code=$(curl -sS -o /tmp/cf-pages-project.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PROJECT_NAME}")

          if [ "$status_code" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Cloudflare Pages project '${CLOUDFLARE_PROJECT_NAME}' already exists."
          elif [ "$status_code" = "404" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare Pages project '${CLOUDFLARE_PROJECT_NAME}' not found. It will be created."
          else
            echo "Unexpected API response (${status_code})."
            cat /tmp/cf-pages-project.json
            exit 1
          fi

      - name: Create Pages project
        if: steps.check_pages_project.outputs.exists == 'false'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.80.0"
          command: pages project create worker-ast-viz --production-branch main

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.80.0"
          command: pages deploy dist --project-name worker-ast-viz --branch main --commit-dirty=true
